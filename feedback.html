<div class="feedback-container">
    <h2>We Value Your Feedback ☕</h2>

    <form id="feedback-form">
        <input type="text" id="fb-name" placeholder="Your Name" required>
        <input type="email" id="fb-email" placeholder="Your Email" required>
        <label for="fb-rating">Rate Us:</label>
        <select id="fb-rating" required>
            <option value="">Rate Us</option>
            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
            <option value="4">⭐⭐⭐⭐ Very Good</option>
            <option value="3">⭐⭐⭐ Good</option>
            <option value="2">⭐⭐ Average</option>
            <option value="1">⭐ Poor</option>
        </select>

        <textarea id="fb-message" placeholder="Write your feedback..." required></textarea>

        <button type="submit">Submit Feedback</button>
    </form>

    <p id="feedback-success"></p>
</div>
